name: Build binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:

  # ─────────────────────────────────────────────
  # macOS Apple Silicon (arm64)
  # ─────────────────────────────────────────────
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: brew install cmake gcc coreutils llvm libomp

      - name: Add LLVM to PATH
        run: echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 4.14.2

      - name: Install OCaml dependencies
        run: opam install dune zarith menhir

      - name: Patch dune files for macOS
        run: |
          LIBOMP_A=$(brew --prefix libomp)/lib/libomp.a

          sed -i '' \
            -e 's/(:standard -g -fPIC -ccopt -fPIC -ccopt -fopenmp)/(:standard -g -ccopt -fPIC)/g' \
            -e 's/(:standard -g -fPIC -ccopt -fPIC -ccopt -fopenmp -ccopt -static)/(:standard -g -ccopt -fPIC -ccopt -static)/g' \
            -e 's/(:standard -O3 -fPIC -ccopt -O3 -ccopt -fPIC -ccopt -fopenmp)/(:standard -O3 -ccopt -O3 -ccopt -fPIC)/g' \
            -e 's/(:standard -O3 -fPIC -ccopt -O3 -ccopt -fPIC -ccopt -fopenmp -ccopt -static)/(:standard -O3 -ccopt -O3 -ccopt -fPIC -ccopt -static)/g' \
            bin/dune
          sed -i '' \
            "s|(-cclib -lgfortran -cclib -lquadmath -cclib -lstdc++)|(-cclib -lgfortran -cclib -lquadmath -cclib -lstdc++ -cclib $LIBOMP_A)|g" \
            bin/dune
          sed -i '' \
            -e 's/(c_flags :standard -fopenmp)/(c_flags :standard)/g' \
            -e 's/(c_flags :standard -O3 -fomit-frame-pointer -fopenmp)/(c_flags :standard -O3 -fomit-frame-pointer)/g' \
            lib/dune
          sed -i '' \
            "s|spawn_and_read_single_line \"nproc\"|spawn_and_read_single_line \"sh -c 'nproc 2>/dev/null \|\| sysctl -n hw.ncpu'\"|g" \
            BiOCamLib/lib/Processes.ml
          echo "=== Patched bin/dune ==="
          cat bin/dune
          echo "=== Patched Processes.ml ==="
          grep -n "spawn_and_read_single_line" BiOCamLib/lib/Processes.ml

      - name: Find gfortran and set compilers
        run: |
          GFORTRAN=$(ls /opt/homebrew/bin/gfortran-* 2>/dev/null | head -1)
          GCC_VER=$(echo $GFORTRAN | grep -oE '[0-9]+$')
          GFORTRAN_LIB=$(ls -d /opt/homebrew/lib/gcc/$GCC_VER 2>/dev/null | head -1)
          LIBOMP_LIB=$(brew --prefix libomp)/lib
          echo "FC=$GFORTRAN" >> $GITHUB_ENV
          echo "CC=$(brew --prefix llvm)/bin/clang" >> $GITHUB_ENV
          echo "CXX=$(brew --prefix llvm)/bin/clang++" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$GFORTRAN_LIB:$LIBOMP_LIB:${LIBRARY_PATH:-}" >> $GITHUB_ENV

      - name: Build
        env:
          BLAS_TARGET: ARMV8
          NO_AVX: 1
          USE_OPENMP: 0
        run: |
          cp "$GITHUB_WORKSPACE/BUILD" "$GITHUB_WORKSPACE/run_build.sh"
          rm "$GITHUB_WORKSPACE/BUILD"
          chmod +x "$GITHUB_WORKSPACE/run_build.sh"
          opam exec -- bash "$GITHUB_WORKSPACE/run_build.sh"

      - uses: actions/upload-artifact@v4
        with:
          name: kpop-macos-arm64
          path: |
            ./build/
            !./build/faiss/

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./build/*

  test-macos-arm64:
    runs-on: macos-14
    needs: build-macos-arm64
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: kpop-macos-arm64
          path: ./build/

      - name: Make binaries executable
        run: chmod +x ./build/KPopCount ./build/KPopCountDB ./build/KPopTwist_ ./build/KPopTwistDB

      - name: Smoke test
        run: |
          echo "=== KPopCount ===" && ./build/KPopCount --help || true
          echo "=== KPopCountDB ===" && ./build/KPopCountDB --help || true
          echo "=== KPopTwist_ ===" && ./build/KPopTwist_ --help || true
          echo "=== KPopTwistDB ===" && ./build/KPopTwistDB --help || true

  # ─────────────────────────────────────────────
  # macOS Intel (x86_64)
  # ─────────────────────────────────────────────
  build-macos-x86_64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: brew install cmake gcc coreutils llvm libomp

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 4.14.2

      - name: Install OCaml dependencies
        run: opam install dune zarith menhir

      - name: Patch dune files for macOS
        run: |
          LIBOMP_A=$(brew --prefix libomp)/lib/libomp.a

          sed -i '' \
            -e 's/(:standard -g -fPIC -ccopt -fPIC -ccopt -fopenmp)/(:standard -g -ccopt -fPIC)/g' \
            -e 's/(:standard -g -fPIC -ccopt -fPIC -ccopt -fopenmp -ccopt -static)/(:standard -g -ccopt -fPIC -ccopt -static)/g' \
            -e 's/(:standard -O3 -fPIC -ccopt -O3 -ccopt -fPIC -ccopt -fopenmp)/(:standard -O3 -ccopt -O3 -ccopt -fPIC)/g' \
            -e 's/(:standard -O3 -fPIC -ccopt -O3 -ccopt -fPIC -ccopt -fopenmp -ccopt -static)/(:standard -O3 -ccopt -O3 -ccopt -fPIC -ccopt -static)/g' \
            bin/dune
          sed -i '' \
            "s|(-cclib -lgfortran -cclib -lquadmath -cclib -lstdc++)|(-cclib -lgfortran -cclib -lquadmath -cclib -lstdc++ -cclib $LIBOMP_A)|g" \
            bin/dune
          sed -i '' \
            -e 's/(c_flags :standard -fopenmp)/(c_flags :standard)/g' \
            -e 's/(c_flags :standard -O3 -fomit-frame-pointer -fopenmp)/(c_flags :standard -O3 -fomit-frame-pointer)/g' \
            lib/dune
          sed -i '' \
            "s|spawn_and_read_single_line \"nproc\"|spawn_and_read_single_line \"sh -c 'nproc 2>/dev/null \|\| sysctl -n hw.ncpu'\"|g" \
            BiOCamLib/lib/Processes.ml

      - name: Find gfortran and set compilers
        run: |
          GFORTRAN=$(ls /usr/local/bin/gfortran-* 2>/dev/null | head -1 || ls /opt/homebrew/bin/gfortran-* 2>/dev/null | head -1)
          GCC_VER=$(echo $GFORTRAN | grep -oE '[0-9]+$')
          GFORTRAN_LIB=$(ls -d /usr/local/lib/gcc/$GCC_VER 2>/dev/null | head -1 || ls -d /opt/homebrew/lib/gcc/$GCC_VER 2>/dev/null | head -1)
          LIBOMP_LIB=$(brew --prefix libomp)/lib
          echo "Found gfortran: $GFORTRAN"
          echo "Found gfortran lib: $GFORTRAN_LIB"
          echo "FC=$GFORTRAN" >> $GITHUB_ENV
          echo "CC=/usr/bin/clang" >> $GITHUB_ENV
          echo "CXX=$(brew --prefix llvm)/bin/clang++" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$GFORTRAN_LIB:$LIBOMP_LIB:${LIBRARY_PATH:-}" >> $GITHUB_ENV

      - name: Build
        env:
          USE_OPENMP: 0
        run: |
          cp "$GITHUB_WORKSPACE/BUILD" "$GITHUB_WORKSPACE/run_build.sh"
          rm "$GITHUB_WORKSPACE/BUILD"
          chmod +x "$GITHUB_WORKSPACE/run_build.sh"
          opam exec -- bash "$GITHUB_WORKSPACE/run_build.sh"

      - uses: actions/upload-artifact@v4
        with:
          name: kpop-macos-x86_64
          path: |
            ./build/
            !./build/faiss/

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./build/*

  test-macos-x86_64:
    runs-on: macos-15-intel
    needs: build-macos-x86_64
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: kpop-macos-x86_64
          path: ./build/

      - name: Make binaries executable
        run: chmod +x ./build/KPopCount ./build/KPopCountDB ./build/KPopTwist_ ./build/KPopTwistDB

      - name: Smoke test
        run: |
          echo "=== KPopCount ===" && ./build/KPopCount --help || true
          echo "=== KPopCountDB ===" && ./build/KPopCountDB --help || true
          echo "=== KPopTwist_ ===" && ./build/KPopTwist_ --help || true
          echo "=== KPopTwistDB ===" && ./build/KPopTwistDB --help || true
